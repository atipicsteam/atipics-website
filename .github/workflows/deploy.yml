name: Deploy to GitHub Pages

on:
  # Déclenche le workflow à chaque push sur la branche principale (main)
  push:
    branches: [ main ]
  # Permet de lancer le workflow manuellement depuis l'onglet Actions
  workflow_dispatch:

# Permet au script d'écrire sur les GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repository using git
        uses: actions/checkout@v4
      
      - name: Install, build, and upload your site
        uses: withastro/action@v2
        with:
          # Spécifie le gestionnaire de paquets
          package-manager: npm

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
